version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "bun"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: "npm"
    directory: "/tokens"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
