name: semantic-lint

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"
      - run: bun install --frozen-lockfile
      # Temporarily disabled until the semantic-class migration is complete.
      # - run: bun semantic
